name: Build and Deploy Frontend

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install Dependencies 🔧
      run: npm ci

    - name: Build Frontend 🏗️
      # Usamos la variable de entorno para que el build sepa a dónde apuntar
      run: npm run build
      env:
        VITE_API_URL: https://observador1.linapps.online/api

    - name: Deploy to GitHub Pages 🚀
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist
        branch: gh-pages
        clean: true
